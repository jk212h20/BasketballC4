<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basketball Connect 4</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="lobby">
    <div class="lobby-content">
      <h1 class="game-title">BASKETBALL CONNECT 4</h1>
      <p class="subtitle">Aim. Shoot. Bounce. Win.</p>
      <div class="mode-select">
        <button id="join-turnbased-btn" class="arcade-btn mode-btn">⏱ TURN-BASED</button>
        <button id="join-simultaneous-btn" class="arcade-btn mode-btn simultaneous-btn">⚡ SIMULTANEOUS</button>
      </div>
      <p class="mode-hint">Turn-based: take turns shooting • Simultaneous: both shoot in real-time</p>
      <p id="lobby-status" class="status-text"></p>
    </div>
  </div>

  <div id="game-screen" style="display:none;">
    <div id="game-header">
      <div id="player1-info" class="player-info">
        <span class="player-indicator p1"></span>
        <span>Player 1</span>
      </div>
      <div id="turn-display">YOUR TURN</div>
      <div id="player2-info" class="player-info">
        <span>Player 2</span>
        <span class="player-indicator p2"></span>
      </div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div id="game-message" style="display:none;">
      <h2 id="message-text"></h2>
      <button id="play-again-btn" class="arcade-btn" style="display:none;">PLAY AGAIN</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/odds.js"></script>
  <script src="/draw.js"></script>
  <script src="/game.js"></script>
</body>
</html>
